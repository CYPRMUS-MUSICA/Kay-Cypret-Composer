<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">KAY CYPRET</a>
      <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>

        <li><a href="pedagogy.html">Resources</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <header class="page-header">
    <h1>Contact</h1>
  </header>

  <section class="section">
    <div class="contact-info">
      <h2>Get In Touch</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">For commissions, lessons, or inquiries</p>
      <a href="mailto:cyprmus@gmail.com" class="email-link">cyprmus@gmail.com</a>
    </div>

    <div class="contact-form">
      <h3>Send a Message</h3>
      <form action="https://formspree.io/f/placeholder" method="POST">
        <div class="form-row">
          <div class="form-group"><label for="fname">First Name *</label><input type="text" id="fname" name="first_name" required></div>
          <div class="form-group"><label for="lname">Last Name *</label><input type="text" id="lname" name="last_name" required></div>
        </div>
        <div class="form-group"><label for="email">Email *</label><input type="email" id="email" name="email" required></div>
        <div class="form-group"><label for="comment">Comment *</label><textarea id="comment" name="message" required></textarea></div>
        <button type="submit" class="btn">Submit</button>
      </form>
    </div>
  </section>

  <footer>
    <div class="social-links">
      <a href="https://www.youtube.com/@KayCyprmus1518" target="_blank" rel="noopener">YouTube</a>
      <a href="mailto:cyprmus@gmail.com">Email</a>
    </div>
    <p>&copy; Kay Cypret. All rights reserved.</p>
  </footer>

</body>
